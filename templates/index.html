<!DOCTYPE html>
<html>
<head>
    <title>ESSIR Monitoring</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #00ff00; text-align: center; }
        .card { border: 2px solid #00ff00; border-radius: 10px; padding: 20px; display: inline-block; margin: 20px; background: #000; box-shadow: 0 0 15px #00ff00; }
        h1 { text-transform: uppercase; letter-spacing: 5px; }
        .stat { font-size: 2em; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🛡️ Network Ops Center</h1>
    <div class="card">
        <h3>CPU Usage</h3>
        <div class="stat">45%</div>
    </div>
    <div class="card">
        <h3>Network Status</h3>
        <div class="stat" style="color: #00ff00;">ONLINE</div>
    </div>
</body>
</html>
